<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EcoFleet — Logistics Platform</title>
<link rel="stylesheet" href="style.css">
<!-- Leaflet Map -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<!-- Chart.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
</head>
<body>

<!-- ===== LOGIN SCREEN ===== -->
<div id="loginScreen" class="login-screen">
  <div class="login-bg-grid"></div>
  <div class="login-container">
    <div class="login-brand">
      <div class="brand-logo">EF</div>
      <h1 class="brand-name">EcoFleet</h1>
      <p class="brand-tagline">AI-Powered Logistics Marketplace</p>
    </div>

    <!-- Role Selection -->
    <div id="roleSelect" class="login-card">
      <h2>Who are you?</h2>
      <p class="login-sub">Select your role to continue</p>
      <div class="role-grid">
        <button class="role-btn" onclick="selectRole('user')">
          <div class="role-icon">📦</div>
          <div class="role-label">Shipper</div>
          <div class="role-desc">Book trucks, track shipments</div>
        </button>
        <button class="role-btn" onclick="selectRole('driver')">
          <div class="role-icon">🚛</div>
          <div class="role-label">Driver</div>
          <div class="role-desc">Accept jobs, manage fleet</div>
        </button>
      </div>
    </div>

    <!-- User Registration Form -->
    <div id="userForm" class="login-card hidden">
      <button class="back-btn" onclick="showRoleSelect()">← Back</button>
      <h2>Shipper Profile</h2>
      <p class="login-sub">Tell us about your business</p>
      <div class="form-grid">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="userName" placeholder="Arjun Sharma" />
        </div>
        <div class="form-group">
          <label>Phone Number</label>
          <input type="tel" id="userPhone" placeholder="+91 98765 43210" />
        </div>
        <div class="form-group">
          <label>Company Name</label>
          <input type="text" id="userCompany" placeholder="Sharma Exports Pvt Ltd" />
        </div>
        <div class="form-group">
          <label>GST Number</label>
          <input type="text" id="userGST" placeholder="33AABCU9603R1ZX" />
        </div>
        <div class="form-group full">
          <label>Primary City</label>
          <select id="userCity">
            <option value="">Select city</option>
            <option>Chennai</option><option>Mumbai</option><option>Delhi</option>
            <option>Bangalore</option><option>Hyderabad</option><option>Kolkata</option>
            <option>Pune</option><option>Ahmedabad</option>
          </select>
        </div>
        <div class="form-group full">
          <label>What do you typically ship?</label>
          <select id="userCargo">
            <option value="">Select cargo type</option>
            <option>Electronics & Appliances</option>
            <option>Textiles & Apparel</option>
            <option>Machinery & Equipment</option>
            <option>FMCG / Consumer Goods</option>
            <option>Perishables & Cold Chain</option>
            <option>Chemicals & Hazardous</option>
            <option>Automotive Parts</option>
            <option>Construction Materials</option>
          </select>
        </div>
      </div>
      <button class="submit-btn" onclick="loginUser()">Enter Platform →</button>
    </div>

    <!-- Driver Registration Form -->
    <div id="driverForm" class="login-card hidden">
      <button class="back-btn" onclick="showRoleSelect()">← Back</button>
      <h2>Driver Profile</h2>
      <p class="login-sub">Set up your driver account</p>
      <div class="form-grid">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="driverName" placeholder="Ravi Kumar" />
        </div>
        <div class="form-group">
          <label>Phone Number</label>
          <input type="tel" id="driverPhone" placeholder="+91 98765 43210" />
        </div>
        <div class="form-group">
          <label>License Number</label>
          <input type="text" id="driverLicense" placeholder="TN07 20230012345" />
        </div>
        <div class="form-group">
          <label>Experience (Years)</label>
          <input type="number" id="driverExp" placeholder="8" min="0" max="40" />
        </div>
        <div class="form-group">
          <label>Truck Type</label>
          <select id="driverTruckType">
            <option value="">Select truck type</option>
            <option>Mini Truck (1-2 Ton)</option>
            <option>Medium Truck (5-10 Ton)</option>
            <option>Heavy Truck (15-25 Ton)</option>
            <option>Container Truck (40ft)</option>
            <option>Refrigerated Truck</option>
          </select>
        </div>
        <div class="form-group">
          <label>Truck Registration</label>
          <input type="text" id="driverReg" placeholder="TN07 AB 1234" />
        </div>
        <div class="form-group full">
          <label>Home Base City</label>
          <select id="driverCity">
            <option value="">Select city</option>
            <option>Chennai</option><option>Mumbai</option><option>Delhi</option>
            <option>Bangalore</option><option>Hyderabad</option><option>Kolkata</option>
            <option>Pune</option><option>Ahmedabad</option>
          </select>
        </div>
      </div>
      <button class="submit-btn" onclick="loginDriver()">Enter Platform →</button>
    </div>
  </div>
</div>

<!-- ===== MAIN APP ===== -->
<div id="mainApp" class="main-app hidden">

  <!-- Top Navigation -->
  <nav class="topnav">
    <div class="nav-left">
      <div class="nav-logo">EF</div>
      <span class="nav-brand">EcoFleet</span>
      <div id="userBadge" class="user-badge"></div>
    </div>
    <div class="nav-center" id="navTabs">
      <!-- Tabs injected by JS -->
    </div>
    <div class="nav-right">
      <button class="nav-icon-btn" id="notifBtn" onclick="toggleNotifications()">
        <span class="notif-icon">🔔</span>
        <span class="notif-badge" id="notifCount">3</span>
      </button>
      <div class="nav-avatar" id="navAvatar">?</div>
    </div>
  </nav>

  <!-- Notification Panel -->
  <div id="notifPanel" class="notif-panel hidden">
    <div class="notif-header">
      <span>Notifications</span>
      <button onclick="clearNotifications()">Clear all</button>
    </div>
    <div id="notifList" class="notif-list"></div>
  </div>

  <!-- Content Pages -->
  <main class="main-content" id="mainContent">
    <!-- Injected by JS based on role -->
  </main>

  <!-- AI Copilot Float -->
  <div class="copilot-float" id="copilotFloat">
    <button class="copilot-toggle" onclick="toggleCopilot()">🤖</button>
    <div class="copilot-panel hidden" id="copilotPanel">
      <div class="copilot-header">AI Copilot</div>
      <div class="copilot-messages" id="copilotMessages"></div>
      <div class="copilot-suggestions">
        <button onclick="askCopilot('Why was this truck selected?')">Why this truck?</button>
        <button onclick="askCopilot('Show cheapest option')">Cheapest option</button>
        <button onclick="askCopilot('Estimate delivery time')">Delivery time</button>
        <button onclick="askCopilot('Show highest rated driver')">Top rated driver</button>
      </div>
    </div>
  </div>

  <!-- Booking Modal -->
  <div id="bookingModal" class="modal-overlay hidden">
    <div class="modal-box">
      <div id="bookingContent"></div>
    </div>
  </div>

  <!-- Driver Profile Modal -->
  <div id="profileModal" class="modal-overlay hidden">
    <div class="modal-box">
      <div id="profileContent"></div>
    </div>
  </div>

  <!-- Toast Container -->
  <div id="toastContainer" class="toast-container"></div>

</div>

<script src="script.js"></script>
</body>
</html>
